<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 380" fill="none">
  <defs>
    <linearGradient id="box-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="box-left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="box-right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
  </defs>

  <!-- isometric package box, centered -->
  <g transform="translate(0, 10)">
    <!-- top face -->
    <polygon points="180,40 290,90 180,140 70,90"
             fill="url(#box-top)" stroke="#78350f" stroke-width="2"/>
    <!-- left face -->
    <polygon points="70,90 180,140 180,280 70,230"
             fill="url(#box-left)" stroke="#78350f" stroke-width="2"/>
    <!-- right face -->
    <polygon points="290,90 180,140 180,280 290,230"
             fill="url(#box-right)" stroke="#78350f" stroke-width="2"/>
    <!-- tape seam on the top -->
    <line x1="125" y1="65" x2="235" y2="115" stroke="#78350f" stroke-width="2" opacity="0.55"/>
    <line x1="235" y1="65" x2="125" y2="115" stroke="#78350f" stroke-width="2" opacity="0.55"/>
  </g>

  <!-- wordmark -->
  <text x="180" y="355"
        font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace"
        font-size="34" font-weight="600" letter-spacing="-0.5"
        text-anchor="middle" fill="#0f172a">guix GUI</text>
</svg>
